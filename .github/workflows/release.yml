on:
  release:
    types:
      - published

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v6

      - id: get-version
        shell: bash
        run: |
          echo "VERSION=$(echo '${{ github.event.release.tag_name }}' | sed 's/^v//')" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ${{ matrix.runs-on }}
    needs:
      - get-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: linux-arm64
            runs-on: ubuntu-24.04-arm
          - runtime: linux-x64
            runs-on: ubuntu-latest
          - runtime: osx-arm64
            runs-on: macos-latest
          - runtime: osx-x64
            runs-on: macos-15-intel
          - runtime: win-arm64
            runs-on: windows-11-arm
          - runtime: win-x64
            runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10

      - shell: bash
        run: |
          dotnet publish src/Lip.Cli \
            -o bin \
            -r ${{ matrix.runtime }} \
            --no-self-contained \
            -p:DebugType=embedded \
            -p:Version=${{ needs.get-version.outputs.version }}

      - shell: bash
        run: |
          dotnet publish src/Lip.Daemon \
            -o bin \
            -r ${{ matrix.runtime }} \
            --no-self-contained \
            -p:DebugType=embedded \
            -p:Version=${{ needs.get-version.outputs.version }}

      - uses: actions/upload-artifact@v7
        with:
          name: lip-${{ needs.get-version.outputs.version }}-${{ matrix.runtime }}
          path: bin/

  create-release-notes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - id: extract-release-notes
        uses: ffurrer2/extract-release-notes@v3

      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.extract-release-notes.outputs.release_notes }}

  create-portable-archives:
    runs-on: ubuntu-latest
    needs:
      - build
      - get-version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - linux-arm64
          - linux-x64
          - osx-arm64
          - osx-x64
          - win-arm64
          - win-x64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: lip-${{ needs.get-version.outputs.version }}-${{ matrix.runtime }}
          path: .tmp

      - if: startsWith(matrix.runtime, 'linux-')
        run: |
          tar -cJvf "lip-${{ needs.get-version.outputs.version }}-${{ matrix.runtime }}.tar.xz" -C .tmp .

      - if: ${{ !startsWith(matrix.runtime, 'linux-') }}
        working-directory: .tmp
        run: |
          zip -r9 "../lip-${{ needs.get-version.outputs.version }}-${{ matrix.runtime }}.zip" *

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            lip-${{ needs.get-version.outputs.version }}-${{ matrix.runtime }}.{zip,tar.xz}

  create-windows-installer:
    runs-on: ${{ matrix.runs-on }}
    needs:
      - build
      - get-version
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - runtime: win-arm64
            runs-on: windows-11-arm
          - runtime: win-x64
            runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: lip-${{ needs.get-version.outputs.version }}-${{ matrix.runtime }}
          path: .tmp/artifacts

      - shell: bash
        run: |
          mkdir -p .tmp/nsis

      - uses: Minionguyjpro/Inno-Setup-Action@v1.2.7
        with:
          path: inno/lip.iss
          options: >-
            /DAppVersion=${{ needs.get-version.outputs.version }}
            /DRuntime=${{ matrix.runtime }}

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            .tmp/nsis/lip-${{ needs.get-version.outputs.version }}-${{ matrix.runtime }}-setup.exe

  publish-npm:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
    needs:
      - build
      - get-version
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@v8
        with:
          pattern: lip-${{ needs.get-version.outputs.version }}-*
          path: .tmp/artifacts

      - run: |
          cp -R npm/. .tmp/npm/

      - run: |
          chmod +x .tmp/npm/lip.js .tmp/npm/lipd.js

      - run: |
          node -e '
            const fs = require("node:fs");
            const file = ".tmp/npm/package.json";
            const pkg = JSON.parse(fs.readFileSync(file, "utf8"));
            pkg.version = "${{ needs.get-version.outputs.version }}";
            fs.writeFileSync(file, `${JSON.stringify(pkg, null, 2)}\n`);
          '

      - run: |
          for target in \
            "linux-x64:linux-x64:lip:lipd" \
            "linux-arm64:linux-arm64:lip:lipd" \
            "osx-x64:darwin-x64:lip:lipd" \
            "osx-arm64:darwin-arm64:lip:lipd" \
            "win-x64:win32-x64:lip.exe:lipd.exe" \
            "win-arm64:win32-arm64:lip.exe:lipd.exe"
          do
            IFS=: read -r runtime npm_dir cli_binary daemon_binary <<< "$target"
            mkdir -p ".tmp/npm/$npm_dir"
            cp ".tmp/artifacts/lip-${{ needs.get-version.outputs.version }}-$runtime/$cli_binary" ".tmp/npm/$npm_dir/$cli_binary"
            cp ".tmp/artifacts/lip-${{ needs.get-version.outputs.version }}-$runtime/$daemon_binary" ".tmp/npm/$npm_dir/$daemon_binary"
            if [[ "$cli_binary" != *.exe ]]; then
              chmod +x ".tmp/npm/$npm_dir/$cli_binary" ".tmp/npm/$npm_dir/$daemon_binary"
            fi
          done

      - run: |
          npm publish .tmp/npm

  publish-winget:
    needs:
      - build
      - create-portable-archives
      - get-version
    runs-on: windows-latest
    env:
      WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - run: |
          $arm64Url = "https://github.com/futrime/lip/releases/download/v${{ needs.get-version.outputs.version }}/lip-${{ needs.get-version.outputs.version }}-win-arm64.zip"
          $x64Url = "https://github.com/futrime/lip/releases/download/v${{ needs.get-version.outputs.version }}/lip-${{ needs.get-version.outputs.version }}-win-x64.zip"

          curl -JLO https://aka.ms/wingetcreate/latest
          .\wingetcreate.exe update futrime.lip `
            --submit `
            --urls "$arm64Url" "$x64Url" `
            --version "${{ needs.get-version.outputs.version }}" 
