on:
  pull_request:
    paths:
      - .github/workflows/build.yml
      - 'src/**'
      - 'tests/**'
  push:
    paths:
      - .github/workflows/build.yml
      - 'src/**'
      - 'tests/**'
  workflow_dispatch:

env:
  DOTNET_VERSION: 10.0

jobs:
  build:
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        runs-on:
          - macos-15-intel
          - macos-latest
          - ubuntu-24.04-arm
          - ubuntu-latest
          - windows-11-arm
          - windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - run: >
          dotnet build -c Release

  publish-cli:
    needs: build
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - linux-arm64
          - linux-x64
          - osx-arm64
          - osx-x64
          - win-arm64
          - win-x64
        include:
          - runtime: linux-arm64
            runs-on: ubuntu-24.04-arm
          - runtime: linux-x64
            runs-on: ubuntu-latest
          - runtime: osx-arm64
            runs-on: macos-15-intel
          - runtime: osx-x64
            runs-on: macos-latest
          - runtime: win-arm64
            runs-on: windows-11-arm
          - runtime: win-x64
            runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - run: |
          dotnet publish src/Lip.Cli -c Release -o bin -r ${{ matrix.runtime }} --sc

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ github.event.repository.name }}-cli-${{ matrix.runtime }}-${{ github.sha }}
          path: bin/

  check-style:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - run: |
          dotnet format --verify-no-changes

  test:
    needs: build
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        runs-on:
          - macos-15-intel
          - macos-latest
          - ubuntu-24.04-arm
          - ubuntu-latest
          - windows-11-arm
          - windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - run: |
          dotnet test
