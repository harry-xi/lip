on:
  release:
    types:
      - published

env:
  DOTNET_VERSION: 10.0

jobs:
  publish-cli:
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        assembly-name:
          - lip
          - lipd
        runtime:
          - linux-arm64
          - linux-x64
          - osx-arm64
          - osx-x64
          - win-arm64
          - win-x64
        include:
          - runtime: linux-arm64
            runs-on: ubuntu-24.04-arm
          - runtime: linux-x64
            runs-on: ubuntu-latest
          - runtime: osx-arm64
            runs-on: macos-15-intel
          - runtime: osx-x64
            runs-on: macos-latest
          - runtime: win-arm64
            runs-on: windows-11-arm
          - runtime: win-x64
            runs-on: windows-latest
          - assembly-name: lip
            project: Lip.Cli
          - assembly-name: lipd
            project: Lip.Daemon
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - id: get-version
        shell: bash
        run: |
          echo "VERSION=$(git describe --tags | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      - shell: bash
        run: |
          dotnet publish src/${{ matrix.project }} \
            -o bin \
            -r ${{ matrix.runtime }} \
            --no-self-contained \
            -p:Version=${{ steps.get-version.outputs.VERSION }}

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.assembly-name }}-${{ steps.get-version.outputs.VERSION }}-${{ matrix.runtime }}
          path: bin/

  update-release-notes:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - id: extract-release-notes
        uses: ffurrer2/extract-release-notes@v3

      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.extract-release-notes.outputs.release_notes }}

  upload-release-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - publish-cli
      - update-release-notes
    strategy:
      fail-fast: false
      matrix:
        assembly-name:
          - lip
          - lipd
        runtime:
          - linux-arm64
          - linux-x64
          - osx-arm64
          - osx-x64
          - win-arm64
          - win-x64
    steps:
      - uses: actions/checkout@v6

      - id: get-version
        run: |
          echo "VERSION=$(git describe --tags | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v7
        with:
          name: ${{ matrix.assembly-name }}-${{ steps.get-version.outputs.VERSION }}-${{ matrix.runtime }}
          path: artifact/

      - run: |
          cp CHANGELOG.md COPYING README.md artifact/

      - working-directory: artifact
        run: |
          if [[ "${{ matrix.runtime }}" == win* ]]; then
            zip -r ../${{ matrix.assembly-name }}-${{ steps.get-version.outputs.VERSION }}-${{ matrix.runtime }}.zip *
          else
            tar -czvf ../${{ matrix.assembly-name }}-${{ steps.get-version.outputs.VERSION }}-${{ matrix.runtime }}.tar.gz *
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.assembly-name }}-${{ steps.get-version.outputs.VERSION }}-${{ matrix.runtime }}.*
