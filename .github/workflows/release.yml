on:
  release:
    types:
      - published

jobs:
  create-release-notes:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - id: extract-release-notes
        uses: ffurrer2/extract-release-notes@v3

      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.extract-release-notes.outputs.release_notes }}

  build:
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: linux-arm64
            runs-on: ubuntu-24.04-arm
          - runtime: linux-x64
            runs-on: ubuntu-latest
          - runtime: osx-arm64
            runs-on: macos-latest
          - runtime: osx-x64
            runs-on: macos-15-intel
          - runtime: win-arm64
            runs-on: windows-11-arm
          - runtime: win-x64
            runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10

      - id: get-version
        shell: bash
        run: |
          echo "VERSION=$(git describe --tags | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      - shell: bash
        run: |
          dotnet publish src/Lip.Cli \
            -o bin \
            -r ${{ matrix.runtime }} \
            --no-self-contained \
            -p:DebugType=embedded \
            -p:Version=${{ steps.get-version.outputs.VERSION }}

      - shell: bash
        run: |
          dotnet publish src/Lip.Daemon \
            -o bin \
            -r ${{ matrix.runtime }} \
            --no-self-contained \
            -p:DebugType=embedded \
            -p:Version=${{ steps.get-version.outputs.VERSION }}

      - uses: actions/upload-artifact@v7
        with:
          name: lip-${{ steps.get-version.outputs.VERSION }}-${{ matrix.runtime }}
          path: bin/

      - shell: bash
        run: |
          cp -R bin/. .tmp/
          cp CHANGELOG.md COPYING README.md .tmp/

      - if: startsWith(matrix.runtime, 'win-')
        shell: pwsh
        run: |
          Compress-Archive `
            -Path .tmp/* `
            -DestinationPath lip-${{ steps.get-version.outputs.VERSION }}-${{ matrix.runtime }}.zip

      - if: ${{ !startsWith(matrix.runtime, 'win-') }}
        shell: bash
        run: |
          tar -czvf lip-${{ steps.get-version.outputs.VERSION }}-${{ matrix.runtime }}.tar.gz -C .tmp .

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            lip-${{ steps.get-version.outputs.VERSION }}-${{ matrix.runtime }}.*

  build-windows-installer:
    needs: build
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - runtime: arm64
            runs-on: windows-11-arm
          - runtime: x64
            runs-on: windows-latest
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10

      - id: get-version
        shell: bash
        run: |
          echo "VERSION=$(git describe --tags | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v8
        with:
          name: lip-${{ steps.get-version.outputs.VERSION }}-win-${{ matrix.runtime }}
          path: bin/

      - run: |
          version=${{ steps.get-version.outputs.VERSION }}
          sed -i "s/0.0.0/${version%%-*}/g" "src/Lip.Installer/Package.wxs"
        shell: bash

      - shell: bash
        run: |
          dotnet build src/Lip.Installer \
            -c Release \
            -o .tmp \
            -p:Platform=${{ matrix.runtime }}

      - run: |
          mv .tmp/en-US/Lip.Installer.msi .tmp/en-US/lip-${{ steps.get-version.outputs.VERSION }}-win-${{ matrix.runtime }}.msi

      - uses: softprops/action-gh-release@v2
        with:
          files: .tmp/en-US/lip-${{ steps.get-version.outputs.VERSION }}-win-${{ matrix.runtime }}.msi

  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - build
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - id: get-version
        run: |
          echo "VERSION=$(git describe --tags | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v8
        with:
          pattern: lip-${{ steps.get-version.outputs.VERSION }}-*
          path: .tmp/artifacts

      - run: |
          cp -R npm/. .tmp/npm/

      - run: |
          node -e '
            const fs = require("node:fs");
            const file = process.argv[1];
            const version = process.argv[2];
            const pkg = JSON.parse(fs.readFileSync(file, "utf8"));
            pkg.version = version;
            fs.writeFileSync(file, `${JSON.stringify(pkg, null, 2)}\n`);
          ' ".tmp/npm/package.json" "${{ steps.get-version.outputs.VERSION }}"

      - run: |
          chmod +x .tmp/npm/lip.js .tmp/npm/lipd.js
          for target in \
            "linux-x64:linux-x64:lip:lipd" \
            "linux-arm64:linux-arm64:lip:lipd" \
            "osx-x64:darwin-x64:lip:lipd" \
            "osx-arm64:darwin-arm64:lip:lipd" \
            "win-x64:win32-x64:lip.exe:lipd.exe" \
            "win-arm64:win32-arm64:lip.exe:lipd.exe"
          do
            IFS=: read -r runtime npm_dir cli_binary daemon_binary <<< "$target"
            mkdir -p ".tmp/npm/$npm_dir"
            cp ".tmp/artifacts/lip-${{ steps.get-version.outputs.VERSION }}-$runtime/$cli_binary" ".tmp/npm/$npm_dir/$cli_binary"
            cp ".tmp/artifacts/lip-${{ steps.get-version.outputs.VERSION }}-$runtime/$daemon_binary" ".tmp/npm/$npm_dir/$daemon_binary"
            if [[ "$cli_binary" != *.exe ]]; then
              chmod +x ".tmp/npm/$npm_dir/$cli_binary" ".tmp/npm/$npm_dir/$daemon_binary"
            fi
          done

      - run: |
          npm publish .tmp/npm

  publish-winget:
    runs-on: windows-latest
    env:
      WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}
    needs:
      - build
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - id: get-version
        shell: bash
        run: |
          echo "VERSION=$(git describe --tags | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      - run: |
          $arm64Url = "https://github.com/futrime/lip/releases/download/v${{ steps.get-version.outputs.VERSION }}/lip-${{ steps.get-version.outputs.VERSION }}-win-arm64.zip"
          $x64Url = "https://github.com/futrime/lip/releases/download/v${{ steps.get-version.outputs.VERSION }}/lip-${{ steps.get-version.outputs.VERSION }}-win-x64.zip"

          curl -JLO https://aka.ms/wingetcreate/latest
          .\wingetcreate.exe update futrime.lip `
            --submit `
            --urls "$arm64Url" "$x64Url" `
            --version "${{ steps.get-version.outputs.VERSION }}" 
